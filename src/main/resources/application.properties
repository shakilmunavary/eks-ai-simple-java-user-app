# H2 Database Configuration
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:testdb_123
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Server Configuration
server.port=8080

# Quiet down general Spring web logging
logging.level.org.springframework.web=WARN
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=WARN
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerAdapter=WARN

# Enable detailed request/response logging for DispatcherServlet only
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG

# Include request details (query params, headers, etc.)
spring.mvc.log-request-details=true

# GitHub API config
github.token=${GITHUB_TOKEN}
github.username=shakilmunavary
